<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Thiệp Thơ Vũ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 0% 0%, #bfdbfe, transparent 55%),
        radial-gradient(circle at 100% 100%, #bbf7d0, #e0f2fe 60%, #ecfeff 100%);
      color: #0f172a;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    .card {
      width: 100%;
      max-width: 430px;
      border-radius: 28px;
      padding: 1.6rem 1.4rem 1.9rem;
      background: linear-gradient(145deg, #f9fafb, #ecfeff);
      border: 1px solid rgba(34, 197, 94, 0.25);
      box-shadow: 0 22px 60px rgba(34, 197, 94, 0.3);
      position: relative;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.1rem;
    }

    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #0369a1;
    }

    .play {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      border: 1px solid rgba(34, 197, 94, 0.6);
      background: #ecfdf5;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: #047857;
    }

    .play-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    .screens {
      position: relative;
      min-height: 320px;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      justify-content: center;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .photo-main {
      border-radius: 22px;
      overflow: hidden;
      border: 2px solid rgba(59, 130, 246, 0.9);
      box-shadow: 0 18px 40px rgba(59, 130, 246, 0.35);
      position: relative;
    }

    .photo-main img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .badge-baby {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(34, 197, 94, 0.7);
      box-shadow: 0 10px 26px rgba(34, 197, 94, 0.4);
      margin-bottom: 1.1rem;
    }

    .badge-baby img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .story-text {
      font-family: "Playfair Display", "Times New Roman", serif;
      font-size: 0.96rem;
      line-height: 1.7;
      text-align: center;
      color: #0369a1;
    }

    .story-line {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .story-line.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .letter {
      position: relative;
      background: #f9fafb;
      color: #0f172a;
      border-radius: 18px;
      padding: 1.2rem 1.3rem 1.3rem;
      border: 1px solid rgba(148, 163, 184, 0.5);
      box-shadow: 0 16px 40px rgba(148, 163, 184, 0.4);
      filter: contrast(0.97) brightness(1.03);
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 14px;
      border: 1px dashed rgba(148, 163, 184, 0.8);
      pointer-events: none;
    }

    .letter-title {
      font-family: "Space Grotesk", system-ui, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    .letter-body {
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .letter-body p + p { margin-top: 0.6rem; }

    .footer {
      margin-top: 1rem;
      font-size: 0.8rem;
      opacity: 0.8;
      text-align: center;
      color: #0369a1;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="header">
      <div>
        <div class="tag">16.02 · Thơ Vũ</div>
      </div>
      <button class="play" id="btnPlay">
        <span class="play-dot"></span>
        <span>Cross Over</span>
      </button>
    </div>

    <div class="screens">
      <!-- Trang 1: Bé Thơ -->
      <section class="screen active" data-screen="0">
        <div class="photo-main">
          <img src="Thobe.png" alt="Thơ Vũ bé" />
        </div>
        <div class="story-text">
          <p id="pastLine1" class="story-line"></p>
          <p id="pastLine2" class="story-line"></p>
        </div>
      </section>

      <!-- Trang 2: Thơ bây giờ -->
      <section class="screen" data-screen="1">
        <div class="story-text">
          <p id="nowLine" class="story-line"></p>
        </div>
        <div class="badge-baby" id="nowPhoto" style="opacity: 0; transition: opacity 0.6s ease;">
          <img src="Tho.jpg" alt="Thơ Vũ" />
        </div>
      </section>

      <!-- Trang 3: Lời chúc -->
      <section class="screen" data-screen="2">
        <div class="letter">
          <div class="letter-title">Gửi Thơ,</div>
          <div class="letter-body">
            <p>Chúc bạn năm mới tràn ngập niềm vui và tiếng cười (nhưng cười vừa thôi kẻo người ta tưởng có chuyện :)))).</p>
            <p>Mong bạn ngày càng thành công hơn trên con đường đã chọn và đi một đường thẳng chứ đừng đánh lái hình chữ S nữa nhé :)))).</p>
          </div>
        </div>
      </section>
    </div>

    <p class="footer" id="hintText">Chạm vào thiệp để kể chuyện & bật nhạc.</p>
  </div>

  <audio id="bg" src="Cross Over.mp3" preload="auto" loop></audio>
  <script>
    const screens = Array.from(document.querySelectorAll(".screen"));
    const card = document.getElementById("card");
    const bg = document.getElementById("bg");
    const btnPlay = document.getElementById("btnPlay");
    const hintText = document.getElementById("hintText");

    let current = 0;
    let started = false;
    let musicOn = false;

    function showScreen(index) {
      current = Math.max(0, Math.min(index, screens.length - 1));
      screens.forEach((s, i) => {
        s.classList.toggle("active", i === current);
      });
    }

    async function ensureMusic() {
      if (!bg || musicOn) return;
      try {
        await bg.play();
        musicOn = true;
      } catch (e) {}
    }

    function typeText(el, text, speed, done) {
      if (!el) return;
      el.textContent = text;
      if (typeof done === "function") done();
    }

    function startStory() {
      if (started) return;
      started = true;
      if (hintText) hintText.textContent = "Đang kể chuyện cho bạn nghe...";
      ensureMusic();

      const pastLine1 = document.getElementById("pastLine1");
      const pastLine2 = document.getElementById("pastLine2");
      const nowLine = document.getElementById("nowLine");
      const nowPhoto = document.getElementById("nowPhoto");

      const text1 = "\"Ngày xưa, có một cô bé cười to hơn cả tiếng TV...\"";
      const text2 = "Và cũng chính tiếng cười đó làm cả phòng khám thú y sáng lên.";
      const textNow = "\"...Bây giờ thì vẫn quậy, nhưng là quậy theo kiểu rất có tâm với mọi sinh vật nhỏ bé.\"";

      typeText(pastLine1, text1, 50, () => {
        setTimeout(() => {
          typeText(pastLine2, text2, 50, () => {
            setTimeout(() => {
              showScreen(1);
              setTimeout(() => {
                typeText(nowLine, textNow, 55, () => {
                  setTimeout(() => {
                    if (nowLine) nowLine.style.opacity = "0";
                    setTimeout(() => {
                      if (nowPhoto) nowPhoto.style.opacity = "1";
                    }, 400);
                  }, 900);
                });
              }, 400);
            }, 600);
          });
        }, 600);
      });

      setTimeout(() => {
        showScreen(2);
        if (hintText) hintText.textContent = "Chúc mừng năm mới & sinh nhật Thơ :3";
      }, 11000);
    }

    card?.addEventListener("click", () => {
      startStory();
    });

    btnPlay?.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (!bg) return;
      try {
        if (!musicOn) {
          await bg.play();
          musicOn = true;
        } else {
          bg.pause();
          musicOn = false;
        }
      } catch {}
    });
  </script>
</body>
</html>
